<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "AI Summarizer" }}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
      --primary: #0b5ed7;
      --sidebar: #ffffff;
      --active: #e9f2ff;
    }

    body{ background: var(--bg); color: var(--text); }
    .sidebar{
      width: 270px; min-height: 100vh;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      position: fixed; left: 0; top: 0;
      padding: 18px 14px;
    }
    .content{ margin-left: 270px; padding: 18px 22px 32px; }
    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight: 800; font-size: 18px; margin-bottom: 16px;
    }
    .brand-badge{
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--active);
      display:flex; align-items:center; justify-content:center;
      color: var(--primary); font-weight: 800;
    }
    .nav-link{
      border-radius: 12px;
      padding: 10px 12px;
      color: #475569;
      display:flex; align-items:center; gap:10px;
    }
    .nav-link.active{
      background: var(--active);
      color: var(--primary);
      font-weight: 600;
    }
    .nav-icon{
      width: 26px; height: 26px; border-radius: 9px;
      display:flex; align-items:center; justify-content:center;
      background: #f1f5f9;
      color:#334155;
      font-size: 12px;
      flex: 0 0 26px;
    }
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom: 14px;
    }
    .page-title{ font-size: 26px; font-weight: 800; letter-spacing: -0.3px; }
    .page-subtitle{ color: var(--muted); margin-top: 4px; }

    .card{
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .btn{ border-radius: 12px; }
    .form-control, .form-select{
      border-radius: 12px;
      border-color: var(--border);
      padding: 10px 12px;
    }
    .section-label{
      font-weight: 700;
      margin-bottom: 10px;
    }
    .step{
      display:flex; align-items:flex-start; gap:10px;
      margin-bottom: 10px;
      color: var(--muted);
    }
    .step .dot{
      width: 22px; height: 22px; border-radius: 50%;
      background: #eef2ff;
      color:#3730a3;
      display:flex; align-items:center; justify-content:center;
      font-size: 12px; font-weight: 700;
      margin-top: 2px;
    }
    .result-box{
      border:1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fbfcff;
    }
    .pill{
      display:inline-flex; gap:6px; align-items:center;
      padding: 6px 10px; border-radius: 999px;
      background:#f1f5f9; color:#0f172a;
      font-size: 12px; font-weight: 600;
      border: 1px solid var(--border);
    }
    .divider{ height:1px; background: var(--border); margin: 14px 0; }

    @media (max-width: 991px){
      .sidebar{ position: static; width: 100%; min-height: auto; border-right: 0; border-bottom:1px solid var(--border); }
      .content{ margin-left: 0; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-badge">AI</div>
      <div>
        <div>AI Summarizer</div>
        <div class="small text-muted">PDF • Video • YouTube</div>
      </div>
    </div>

    <nav class="nav flex-column gap-1">
      <a class="nav-link {{ 'active' if active_page=='video' else '' }}" href="/video">
        <span class="nav-icon">▶</span> Video Summarizer
      </a>
      <a class="nav-link {{ 'active' if active_page=='pdf' else '' }}" href="/pdf">
        <span class="nav-icon">📄</span> PDF Summarizer
      </a>
    </nav>

  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
